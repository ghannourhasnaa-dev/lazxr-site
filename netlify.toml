[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Production branch
[context.production]
  command = "echo 'Deploying LAZXR production'"

# Preprod branch - deploy preview
[context.preprod]
  command = "echo 'Deploying LAZXR preprod'"

# Develop branch - deploy preview
[context.develop]
  command = "echo 'Deploying LAZXR develop'"

# Headers for performance
[[headers]]
  for = "/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "model/gltf-binary"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# Redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}
